<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Sastrería Digital — Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#153150;--orange:#ED6F21;--bg:#f5f6f8;--surface:#fff;
  --border:#e2e5ea;--text:#1a1a1a;--muted:#6b7280;--light:#f0f2f5;
  --c-pending:#f59e0b;--c-inprogress:#3b82f6;--c-done:#10b981;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,#1d3f63 100%)}
.auth-card{background:var(--surface);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.auth-logo-brand{font-size:26px;font-weight:700;color:var(--navy);line-height:1.2;text-align:center}
.auth-logo-brand span{color:var(--orange)}
.auth-logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;text-align:center;margin-bottom:28px}
.auth-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.auth-tabs{display:flex;gap:4px;background:var(--light);padding:4px;border-radius:10px;margin-bottom:18px}
.auth-tab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all .15s}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* LAYOUT */
#app-screen{display:none}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--navy);flex-shrink:0;display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px}

/* SIDEBAR */
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-label{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.logo-brand{color:var(--orange);font-size:17px;font-weight:700;line-height:1.2}
.logo-sub{color:rgba(255,255,255,.35);font-size:11px;margin-top:2px}
.nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--orange);color:#fff}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 12px 6px;margin-top:8px}
.user-bar{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.user-name{color:rgba(255,255,255,.8);font-size:12px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{color:rgba(255,255,255,.4);font-size:11px;margin-bottom:8px}
.btn-logout{width:100%;padding:7px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-logout:hover{background:rgba(255,255,255,.15);color:#fff}

/* BUTTONS */
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Outfit',sans-serif}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:#d4601a}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--light)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#1d3f63}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:7px;display:flex;align-items:center;justify-content:center}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}.btn-danger:hover{background:#fecaca}

/* CALENDAR */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:8px 8px 0 0;overflow:hidden}
.cal-day-header{background:var(--navy);color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-transform:uppercase;padding:8px;text-align:center;letter-spacing:1px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:0 0 8px 8px;overflow:hidden}
.cal-cell{background:var(--surface);min-height:110px;padding:6px}
.cal-cell.other-month{background:#fafafa}
.cal-cell.today-cell{background:#fff8f5}
.cal-date-num{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.today-dot{color:#fff!important;background:var(--orange);width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}

/* CAL PILL — clean, colored by status */
.cal-pill{display:flex;align-items:center;gap:4px;padding:3px 7px;border-radius:5px;font-size:10px;font-weight:600;margin-bottom:3px;cursor:pointer;transition:opacity .15s;border:none;width:100%;text-align:left;font-family:'Outfit',sans-serif}
.cal-pill:hover{opacity:.8}
.cal-pill .pill-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.7);flex-shrink:0}
.cal-pill .pill-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.cal-pill .pill-phase{font-size:9px;opacity:.8;flex-shrink:0}
.cal-pill.status-pending{background:#fef3c7;color:#92400e}
.cal-pill.status-inprogress{background:#dbeafe;color:#1e40af}
.cal-pill.status-done{background:#d1fae5;color:#065f46}
.add-pub-btn{width:100%;border:1px dashed var(--border);background:transparent;border-radius:4px;padding:3px;font-size:10px;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;margin-top:3px;transition:all .15s}
.add-pub-btn:hover{border-color:var(--orange);color:var(--orange)}

/* ===== KANBAN ===== */
.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.kanban-col{border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.kanban-col-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.kanban-col-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.kanban-col-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.kanban-col-body{padding:12px;min-height:120px;display:flex;flex-direction:column;gap:10px}
.kanban-col-body.drag-over{background:rgba(237,111,33,.05);border-radius:8px}

/* PENDING col */
.col-pending .kanban-col-header{background:#fffbeb}
.col-pending .kanban-col-title{color:#92400e}
.col-pending .kanban-col-count{background:#fef3c7;color:#92400e}
.col-pending .kanban-col-body{background:#fffbeb55}
/* INPROGRESS col */
.col-inprogress .kanban-col-header{background:#eff6ff}
.col-inprogress .kanban-col-title{color:#1e40af}
.col-inprogress .kanban-col-count{background:#dbeafe;color:#1e40af}
.col-inprogress .kanban-col-body{background:#eff6ff55}
/* DONE col */
.col-done .kanban-col-header{background:#f0fdf4}
.col-done .kanban-col-title{color:#065f46}
.col-done .kanban-col-count{background:#d1fae5;color:#065f46}
.col-done .kanban-col-body{background:#f0fdf455}

/* STICKY NOTE */
.sticky{background:#fff;border-radius:10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:grab;transition:transform .15s,box-shadow .15s;position:relative;border-top:4px solid var(--c-pending)}
.sticky:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
.sticky:active{cursor:grabbing}
.sticky.inprogress{border-top-color:var(--c-inprogress)}
.sticky.done{border-top-color:var(--c-done)}
.sticky-id{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sticky-title{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:8px;color:var(--text)}
.sticky-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.sticky-unit{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.sticky-date{font-size:10px;color:var(--muted)}
.sticky-responsible{font-size:10px;color:var(--muted)}
.sticky-actions{display:flex;gap:4px;margin-top:8px}
.sticky-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .15s}
.sticky-btn-detail{background:var(--light);color:var(--text)}.sticky-btn-detail:hover{background:var(--border)}
.sticky-btn-move{background:var(--navy);color:#fff}.sticky-btn-move:hover{background:#1d3f63}
.sticky-phases{display:flex;gap:3px;margin-top:6px}
.s-pip{height:4px;border-radius:2px;flex:1}

/* HISTORY */
.history-section{margin-top:32px}
.history-header{font-size:14px;font-weight:700;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;border-top:2px solid var(--border);padding-top:20px}
.history-row{display:grid;grid-template-columns:80px 1fr 130px 140px 100px;gap:12px;padding:10px 14px;background:var(--surface);border-radius:8px;margin-bottom:6px;align-items:center;border:1px solid var(--border)}
.history-row:hover{background:var(--light);cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-lg{max-width:840px}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10}
.modal-title{font-size:16px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
.close-btn:hover{color:var(--text)}

/* FORMS */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Outfit',sans-serif;color:var(--text);background:var(--surface);transition:border-color .15s}
.form-control:focus{outline:none;border-color:var(--orange)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
textarea.form-control{resize:vertical;min-height:80px}

/* PHASE CARDS */
.phase-card{border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.phase-header{padding:12px 16px;background:var(--light);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.phase-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.phase-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.phase-body{padding:16px;display:none}
.phase-body.open{display:block}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.phase-dot.pending{background:var(--c-pending)}
.phase-dot.inprogress{background:var(--c-inprogress)}
.phase-dot.done{background:var(--c-done)}

/* COMMENTS */
.comment{border-left:2px solid var(--border);padding:8px 12px;margin-bottom:8px;border-radius:0 6px 6px 0}
.comment-admin{border-color:var(--orange);background:#fff8f5}
.comment-meta{font-size:11px;color:var(--muted);margin-bottom:4px}
.comment-text{font-size:13px;line-height:1.5}

/* CARD */
.card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--light);border-radius:8px;padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* AI CHAT */
.chat-area{height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:16px;background:var(--light);margin-bottom:12px}
.chat-msg{margin-bottom:12px}
.chat-msg.user{text-align:right}
.chat-bubble{display:inline-block;padding:9px 13px;border-radius:10px;font-size:13px;max-width:82%;text-align:left;line-height:1.6}
.chat-msg.user .chat-bubble{background:var(--navy);color:#fff}
.chat-msg.ai .chat-bubble{background:var(--surface);border:1px solid var(--border)}
.chat-who{font-size:10px;color:var(--muted);margin-bottom:3px}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Outfit',sans-serif}
.chat-input:focus{outline:none;border-color:var(--orange)}

/* METRICS */
.metric-input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:100%;font-family:'Outfit',sans-serif;text-align:center}
.metric-input:focus{outline:none;border-color:var(--orange)}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.status-pending{background:#fef3c7;color:#92400e}
.status-inprogress{background:#dbeafe;color:#1e40af}
.status-done{background:#d1fae5;color:#065f46}

/* LOADING */
.loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:8px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.full-spinner{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.full-spinner .spinner{width:32px;height:32px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ADMIN */
.admin-panel{background:#fff8f5;border:1px solid #fed7aa;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.client-card{border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.client-card:hover,.client-card.selected{border-color:var(--orange);background:#fff8f5;transform:translateY(-2px)}

/* CONFETTI */
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999}
</style>
</head>
<body>

<div id="loading-screen" class="full-spinner">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--muted)">Cargando...</div>
</div>

<!-- AUTH -->
<div id="auth-screen" style="display:none">
  <div class="auth-card">
    <div class="auth-logo-brand">La <span>Sastrería</span> Digital</div>
    <div class="auth-logo-sub">Content Planner</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchAuthTab('register')" id="register-tab" style="display:none">Crear cliente</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label class="form-label">Correo</label><input class="form-control" id="login-email" type="email" placeholder="correo@ejemplo.com"/></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input class="form-control" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn btn-primary" style="width:100%;padding:11px" onclick="doLogin()" id="login-btn">Entrar</button>
<div style="text-align:center;margin-top:12px">
  <button onclick="resetPassword()" style="background:none;border:none;color:var(--orange);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;text-decoration:underline">
    ¿Olvidaste tu contraseña?
  </button>
</div>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label class="form-label">Nombre del cliente</label><input class="form-control" id="reg-name" placeholder="Nombre o empresa"/></div>
      <div class="form-group"><label class="form-label">Correo</label><input class="form-control" id="reg-email" type="email" placeholder="correo@ejemplo.com"/></div>
      <div class="form-group"><label class="form-label">Contraseña temporal</label><input class="form-control" id="reg-pass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <button class="btn btn-primary" style="width:100%;padding:11px" onclick="doRegister()" id="reg-btn">Crear cliente</button>
      <button class="btn btn-outline" style="width:100%;padding:11px;margin-top:8px" onclick="switchAuthTab('login')">← Volver</button>
    </div>
  </div>
</div>


<!-- APP -->
<div id="app-screen">
<div class="app">
  <div class="sidebar">
    <div class="logo">
  <img src="logo.png" alt="La Sastrería Digital" 
       style="width:100%;max-width:160px;padding:4px 0">
  <div class="logo-sub" style="color:rgba(255,255,255,0.4);
       font-size:11px;margin-top:6px">Content Planner</div>
</div>
    <nav class="nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="navigate('calendar')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendario</span>
      </div>
      <div class="nav-item" onclick="navigate('kanban')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/></svg>
        <span>Publicaciones</span>
      </div>
      <div class="nav-section">Herramientas</div>
      <div class="nav-item" onclick="navigate('units')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Unidades</span>
      </div>
      <div class="nav-item" onclick="navigate('ai')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-width="3" stroke-linecap="round"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-width="3" stroke-linecap="round"/></svg>
        <span>Asistente IA</span>
      </div>
      <div class="nav-item" onclick="navigate('metrics')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Métricas</span>
      </div>
      <div class="nav-item" id="nav-admin" onclick="navigate('admin')" style="display:none">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Clientes</span>
      </div>
    </nav>
    <div class="user-bar">
      <div class="user-name" id="sidebar-username">—</div>
      <div class="user-role" id="sidebar-role">—</div>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>

// ====== CONFETTI ======
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = Array.from({length:160}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*-200,
    w: 8+Math.random()*8, h: 5+Math.random()*5,
    r: Math.random()*Math.PI*2, dr: (Math.random()-.5)*.2,
    vx: (Math.random()-.5)*3, vy: 2+Math.random()*4,
    color: ['#ED6F21','#153150','#10b981','#f59e0b','#3b82f6','#ec4899','#8b5cf6'][Math.floor(Math.random()*7)]
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.r+=p.dr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame < 120) requestAnimationFrame(draw);
    else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}

// ====== CALENDAR ======
function renderCalendar(c){
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const y=currentYear, m=currentMonth;
  const first=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const diPrev=new Date(y,m,0).getDate();
  const todayD=new Date();

  // Build a map: date -> [{pub, phase}]
  const dateMap = {};
  const phaseKeys = ['planning','production','editing','publish'];
  const phaseLabels = ['Plan','Prod','Edit','Pub'];
  publications.forEach(p => {
    // main publication date
    const addToMap = (dateStr, phaseLabel) => {
      if(!dateStr) return;
      if(!dateMap[dateStr]) dateMap[dateStr]=[];
      dateMap[dateStr].push({pub:p, phase:phaseLabel});
    };
    addToMap(p.date, '🚀');
    // phase dates
    if(p.phaseDates){
      if(p.phaseDates.planning) addToMap(p.phaseDates.planning,'📝');
      if(p.phaseDates.production) addToMap(p.phaseDates.production,'🎬');
      if(p.phaseDates.editing) addToMap(p.phaseDates.editing,'✂️');
      if(p.phaseDates.publish) addToMap(p.phaseDates.publish,'🚀');
    }
  });

  let cells='';
  for(let i=first-1;i>=0;i--) cells+=`<div class="cal-cell other-month"><div class="cal-date-num">${diPrev-i}</div></div>`;

  for(let d=1;d<=dim;d++){
    const ds=`${y}-${pad(m+1)}-${pad(d)}`;
    const isToday=todayD.getFullYear()===y&&todayD.getMonth()===m&&todayD.getDate()===d;
    const entries=dateMap[ds]||[];
    const dateHtml=isToday?`<div class="cal-date-num"><span class="today-dot">${d}</span></div>`:`<div class="cal-date-num">${d}</div>`;
    const pillsHtml=entries.map(({pub,phase})=>{
      const sc=`status-${pub.status||'pending'}`;
      return `<button class="cal-pill ${sc}" onclick="openDetail('${pub.id}')"><span class="pill-phase">${phase}</span><span class="pill-label">${esc(pub.pubId||pub.id)}</span></button>`;
    }).join('');
    const canAdd=!isAdmin()||viewingClientId;
    cells+=`<div class="cal-cell${isToday?' today-cell':''}">${dateHtml}${pillsHtml}${canAdd?`<button class="add-pub-btn" onclick="openNewPubDate('${ds}')">+ agregar</button>`:''}</div>`;
  }
  const total=first+dim, rem=total%7===0?0:7-(total%7);
  for(let j=1;j<=rem;j++) cells+=`<div class="cal-cell other-month"><div class="cal-date-num">${j}</div></div>`;

  c.innerHTML=adminBanner()
    +`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-outline btn-icon" onclick="prevMonth()">‹</button>
        <h2 style="font-size:18px;font-weight:600">${months[m]} ${y}</h2>
        <button class="btn btn-outline btn-icon" onclick="nextMonth()">›</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="chip status-pending">● Pendiente</span>
        <span class="chip status-inprogress">● En proceso</span>
        <span class="chip status-done">● Realizada</span>
      </div>
    </div>
    <div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden">
      <div class="cal-header">${days.map(d=>`<div class="cal-day-header">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}
window.prevMonth=()=>{currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderView('calendar');};
window.nextMonth=()=>{currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderView('calendar');};

// ====== KANBAN ======
function renderKanban(c){
  const active=publications.filter(p=>p.status!=='done');
  const done=publications.filter(p=>p.status==='done').sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const groups={pending:[],inprogress:[],done_active:[]};
  active.forEach(p=>{ if(p.status==='pending') groups.pending.push(p); else if(p.status==='inprogress') groups.inprogress.push(p); });

  function stickyCard(p){
    const phColors=[p.phases?.planning?.status,p.phases?.production?.status,p.phases?.editing?.status,p.phases?.publish?.status]
      .map(s=>`<div class="s-pip" style="background:${phaseColor(s||'pending')}" title="${s||'pending'}"></div>`).join('');
    const nextStatus={pending:'inprogress',inprogress:'done'}[p.status];
    const nextLabel={pending:'→ En proceso',inprogress:'→ Realizada'}[p.status]||'';
    return `<div class="sticky ${p.status||'pending'}" id="sticky-${p.id}" draggable="true" ondragstart="dragStart(event,'${p.id}')" ondragend="dragEnd(event)">
      <div class="sticky-id">${esc(p.pubId||p.id)}</div>
      <div class="sticky-title">${esc((p.script||'').substring(0,60))}${(p.script||'').length>60?'...':''}</div>
      <div class="sticky-meta">
        <span class="sticky-unit chip" style="${unitStyle(p.unit)}">${esc(p.unit)}</span>
        <span class="sticky-date">📅 ${p.date||'—'}</span>
      </div>
      <div class="sticky-meta" style="margin-top:4px"><span class="sticky-responsible">👤 ${esc(p.responsible||'')}</span></div>
      <div class="sticky-phases">${phColors}</div>
      <div class="sticky-actions">
        <button class="sticky-btn sticky-btn-detail" onclick="openDetail('${p.id}')">Ver detalle</button>
        ${nextStatus?`<button class="sticky-btn sticky-btn-move" onclick="moveCard('${p.id}','${nextStatus}')">${nextLabel}</button>`:''}
      </div>
    </div>`;
  }

  const historyRows=done.map(p=>`
    <div class="history-row" onclick="openDetail('${p.id}')">
      <span style="font-size:12px;font-weight:600;color:var(--muted)">${esc(p.pubId||p.id)}</span>
      <span style="font-size:13px">${esc((p.script||'').substring(0,55))}...</span>
      <span><span class="chip" style="${unitStyle(p.unit)}">${esc(p.unit)}</span></span>
      <span style="font-size:12px;color:var(--muted)">${esc(p.responsible||'')}</span>
      <span style="font-size:12px;color:var(--muted)">${p.date||'—'}</span>
    </div>`).join('');

  c.innerHTML=adminBanner()
    +`<div class="kanban-board">
      <div class="kanban-col col-pending" ondragover="dragOver(event)" ondrop="dropCard(event,'pending')">
        <div class="kanban-col-header">
          <div class="kanban-col-title">⏳ Pendiente<span class="kanban-col-count">${groups.pending.length}</span></div>
        </div>
        <div class="kanban-col-body" id="col-pending">${groups.pending.map(stickyCard).join('')||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">Sin publicaciones</div>'}</div>
      </div>
      <div class="kanban-col col-inprogress" ondragover="dragOver(event)" ondrop="dropCard(event,'inprogress')">
        <div class="kanban-col-header">
          <div class="kanban-col-title">🔄 En proceso<span class="kanban-col-count">${groups.inprogress.length}</span></div>
        </div>
        <div class="kanban-col-body" id="col-inprogress">${groups.inprogress.map(stickyCard).join('')||'<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">Sin publicaciones</div>'}</div>
      </div>
      <div class="kanban-col col-done" ondragover="dragOver(event)" ondrop="dropCard(event,'done')">
        <div class="kanban-col-header">
          <div class="kanban-col-title">✅ Realizadas<span class="kanban-col-count">${done.length}</span></div>
        </div>
        <div class="kanban-col-body" id="col-done"><div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">Arrastra aquí para marcar como realizada 🎉</div></div>
      </div>
    </div>
    ${done.length>0?`
    <div class="history-section">
      <div class="history-header">📚 Historial de publicaciones realizadas <span style="background:var(--light);color:var(--muted);padding:2px 8px;border-radius:20px;font-size:12px">${done.length}</span></div>
      <div style="background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden">
        <div style="display:grid;grid-template-columns:80px 1fr 130px 140px 100px;padding:8px 14px;background:var(--light);border-bottom:1px solid var(--border)">
          ${['ID','Concepto','Unidad','Responsable','Fecha pub.'].map(h=>`<div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${h}</div>`).join('')}
        </div>
        ${historyRows}
      </div>
    </div>`:''}`;
}

// DRAG & DROP
let dragId=null;
window.dragStart=(e,id)=>{ dragId=id; setTimeout(()=>{ const el=document.getElementById('sticky-'+id); if(el) el.style.opacity='.4'; },0); };
window.dragEnd=(e)=>{ const el=document.getElementById('sticky-'+dragId); if(el) el.style.opacity='1'; };
window.dragOver=(e)=>{ e.preventDefault(); e.currentTarget.querySelector('.kanban-col-body')?.classList.add('drag-over'); };
window.dropCard=async(e,newStatus)=>{ e.preventDefault(); e.currentTarget.querySelector('.kanban-col-body')?.classList.remove('drag-over'); if(dragId) await moveCard(dragId,newStatus); dragId=null; };

window.moveCard=async(fid,newStatus)=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  const oldStatus=p.status;
  p.status=newStatus;
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{status:newStatus});
  if(newStatus==='done'&&oldStatus!=='done') fireConfetti();
};

// ====== NEW PUB ======
window.openNewPub=()=>{
  if(isAdmin()&&!viewingClientId){alert('Selecciona un cliente primero desde la sección Clientes.');navigate('admin');return;}
  populateUnitSelect(); document.getElementById('f-date').value='';
  ['f-date-plan','f-date-prod','f-date-edit','f-date-pub'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('modal-new').style.display='flex';
};
window.openNewPubDate=dateStr=>{
  if(isAdmin()&&!viewingClientId) return;
  populateUnitSelect(); document.getElementById('f-date').value=dateStr;
  document.getElementById('modal-new').style.display='flex';
};
function populateUnitSelect(){
  const sel=document.getElementById('f-unit');
  sel.innerHTML='<option value="">Selecciona...</option>'+units.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join('');
}
window.saveNewPub=async()=>{
  const pubId=document.getElementById('f-id').value.trim();
  const unit=document.getElementById('f-unit').value;
  const resp=document.getElementById('f-resp').value.trim();
  const date=document.getElementById('f-date').value;
  const script=document.getElementById('f-script').value.trim();
  const ref=document.getElementById('f-ref').value.trim();
  if(!pubId||!unit||!resp||!date||!script){alert('Completa todos los campos obligatorios (*)');return;}
  if(publications.find(p=>p.pubId===pubId)){alert('Ya existe una publicación con ese ID.');return;}
  const btn=document.getElementById('save-pub-btn'); btn.textContent='Guardando...'; btn.disabled=true;
  try{
    await addDoc(collection(db,'users',activeClientId(),'publications'),{
      pubId, unit, responsible:resp, date, script, ref, status:'pending', createdAt:todayStr(),
      phaseDates:{
        planning:document.getElementById('f-date-plan').value||'',
        production:document.getElementById('f-date-prod').value||'',
        editing:document.getElementById('f-date-edit').value||'',
        publish:document.getElementById('f-date-pub').value||''
      },
      phases:{
        planning:{status:'pending',notes:''},
        production:{status:'pending',link:'',notes:''},
        editing:{status:'pending',fileLink:'',notes:'',comments:[]},
        publish:{status:'pending',publishDate:'',platform:''}
      },
      metrics:{views:0,reach:0,interactions:0,shares:0,saves:0}
    });
    ['f-id','f-resp','f-date','f-script','f-ref','f-date-plan','f-date-prod','f-date-edit','f-date-pub'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('f-unit').value='';
    closeModal('modal-new');
  }catch(e){alert('Error al guardar: '+e.message);}
  btn.textContent='Crear Publicación'; btn.disabled=false;
};

// ====== DETAIL ======
window.openDetail=fid=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  document.getElementById('detail-title').textContent=(p.pubId||p.id)+' — '+(p.unit||'');
  document.getElementById('detail-sub').textContent='Responsable: '+(p.responsible||'')+'  ·  Fecha: '+(p.date||'');
  const ph=p.phases||{planning:{status:'pending',notes:''},production:{status:'pending',link:'',notes:''},editing:{status:'pending',fileLink:'',notes:'',comments:[]},publish:{status:'pending',publishDate:'',platform:''}};
  const pd=p.phaseDates||{};

  function sel(phase,cur){
    return `<select class="form-control" style="width:130px;font-size:12px;padding:4px 8px" onclick="event.stopPropagation()" onchange="updatePhaseStatus('${fid}','${phase}',this.value)">
      <option value="pending"${cur==='pending'?' selected':''}>Pendiente</option>
      <option value="inprogress"${cur==='inprogress'?' selected':''}>En proceso</option>
      <option value="done"${cur==='done'?' selected':''}>Realizada</option>
    </select>`;
  }

  const plan=`<div class="phase-card">
    <div class="phase-header" onclick="togglePhase('ph1')">
      <div class="phase-title"><div class="phase-num">1</div> 📝 Planteamiento <span class="phase-dot ${ph.planning?.status||'pending'}"></span></div>
      ${sel('planning',ph.planning?.status||'pending')}
    </div>
    <div class="phase-body open" id="ph1">
      <div class="form-row">
        <div><div class="form-label">📅 Fecha planteamiento</div><input class="form-control" type="date" value="${pd.planning||''}" onchange="updatePhaseDate('${fid}','planning',this.value)"/>
        <div class="form-label" style="margin-top:10px">Guión</div>
        <div style="font-size:13px;line-height:1.6;background:var(--light);padding:10px;border-radius:8px">${esc(p.script)}</div>
        ${p.ref?`<div class="form-label" style="margin-top:10px">Referencia</div><a href="${esc(p.ref)}" target="_blank" style="color:var(--orange);font-size:13px;word-break:break-all">${esc(p.ref)}</a>`:''}</div>
        <div><div class="form-label">Notas</div><textarea class="form-control" onchange="updatePhaseNotes('${fid}','planning',this.value)">${esc(ph.planning?.notes||'')}</textarea></div>
      </div>
    </div>
  </div>`;

  const prod=`<div class="phase-card">
    <div class="phase-header" onclick="togglePhase('ph2')">
      <div class="phase-title"><div class="phase-num">2</div> 🎬 Producción <span class="phase-dot ${ph.production?.status||'pending'}"></span></div>
      ${sel('production',ph.production?.status||'pending')}
    </div>
    <div class="phase-body" id="ph2">
      <div class="form-group"><label class="form-label">📅 Fecha producción</label><input class="form-control" type="date" value="${pd.production||''}" onchange="updatePhaseDate('${fid}','production',this.value)"/></div>
      <div class="form-group"><label class="form-label">Enlace al material</label><input class="form-control" value="${esc(ph.production?.link||'')}" placeholder="https://drive.google.com/..." onchange="updatePhaseField('${fid}','production','link',this.value)"/></div>
      <div class="form-group"><label class="form-label">Observaciones</label><textarea class="form-control" onchange="updatePhaseNotes('${fid}','production',this.value)">${esc(ph.production?.notes||'')}</textarea></div>
    </div>
  </div>`;

  const comments=(ph.editing?.comments||[]).map(cm=>`<div class="comment${cm.isAdmin?' comment-admin':''}"><div class="comment-meta">${cm.isAdmin?'👑 ':''}${esc(cm.author)} · ${cm.date}</div><div class="comment-text">${esc(cm.text)}</div></div>`).join('');
  const edit=`<div class="phase-card">
    <div class="phase-header" onclick="togglePhase('ph3')">
      <div class="phase-title"><div class="phase-num">3</div> ✂️ Edición <span class="phase-dot ${ph.editing?.status||'pending'}"></span></div>
      ${sel('editing',ph.editing?.status||'pending')}
    </div>
    <div class="phase-body" id="ph3">
      <div class="form-group"><label class="form-label">📅 Fecha edición</label><input class="form-control" type="date" value="${pd.editing||''}" onchange="updatePhaseDate('${fid}','editing',this.value)"/></div>
      <div class="form-group"><label class="form-label">Enlace archivo de video</label><input class="form-control" value="${esc(ph.editing?.fileLink||'')}" placeholder="https://..." onchange="updatePhaseField('${fid}','editing','fileLink',this.value)"/></div>
      <div class="form-group"><label class="form-label">Observaciones</label><textarea class="form-control" onchange="updatePhaseNotes('${fid}','editing',this.value)">${esc(ph.editing?.notes||'')}</textarea></div>
      <div class="form-label">Historial de cambios</div>
      <div id="comments-${fid}">${comments||'<div style="font-size:12px;color:var(--muted);padding:8px 0">Sin comentarios aún</div>'}</div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <input class="form-control" id="cmt-inp-${fid}" placeholder="Agregar comentario${isAdmin()?' de admin':''}..."/>
        <button class="btn btn-navy btn-sm" onclick="addComment('${fid}')">Comentar</button>
      </div>
    </div>
  </div>`;

  const pPhase=ph.publish||{};
  const platOpts=['','Instagram','TikTok','YouTube','Facebook','LinkedIn'].map(v=>`<option value="${v}"${pPhase.platform===v?' selected':''}>${v||'Seleccionar...'}</option>`).join('');
  const pubPh=`<div class="phase-card">
    <div class="phase-header" onclick="togglePhase('ph4')">
      <div class="phase-title"><div class="phase-num">4</div> 🚀 Publicación <span class="phase-dot ${pPhase.status||'pending'}"></span></div>
      <select class="form-control" style="width:130px;font-size:12px;padding:4px 8px" onclick="event.stopPropagation()" onchange="updatePhaseStatus('${fid}','publish',this.value)">
        <option value="pending"${pPhase.status==='pending'?' selected':''}>Pendiente</option>
        <option value="inprogress"${pPhase.status==='inprogress'?' selected':''}>En proceso</option>
        <option value="done"${pPhase.status==='done'?' selected':''}>Publicada</option>

      <div class="form-row">
        <div class="form-group"><label class="form-label">📅 Fecha de publicación</label><input class="form-control" type="date" value="${pd.publish||pPhase.publishDate||''}" onchange="updatePhaseDate('${fid}','publish',this.value)"/></div>

      </div>
    </div>
  </div>`;

  // Overall status selector
  const overallSel=`<div style="margin-top:16px;padding:12px 16px;background:var(--light);border-radius:10px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:600">Estado general de la publicación</span>
    <select class="form-control" style="width:150px;font-size:13px" onchange="updateOverallStatus('${fid}',this.value)">
      <option value="pending"${(p.status||'pending')==='pending'?' selected':''}>⏳ Pendiente</option>
      <option value="inprogress"${p.status==='inprogress'?' selected':''}>🔄 En proceso</option>
      <option value="done"${p.status==='done'?' selected':''}>✅ Realizada</option>
    </select>
  </div>`;

  document.getElementById('modal-detail-body').innerHTML=
    `<div style="background:var(--light);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap">
      <div style="flex:1;min-width:200px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Concepto</div><div style="font-size:13px;margin-top:4px">${esc((p.script||'').substring(0,120))}${(p.script||'').length>120?'...':''}</div></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="chip" style="${unitStyle(p.unit)}">${esc(p.unit)}</span>
        <span class="status-badge ${statusCls(p.status)}">${statusLbl(p.status)}</span>
      </div>
    </div>`
    +plan+prod+edit+pubPh+overallSel;

  document.getElementById('modal-detail').style.display='flex';
};

window.togglePhase=id=>{const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';};

window.updatePhaseStatus=async(fid,phase,val)=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  if(!p.phases) p.phases={};
  if(!p.phases[phase]) p.phases[phase]={};
  p.phases[phase].status=val;
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{[`phases.${phase}.status`]:val});
};
window.updateOverallStatus=async(fid,val)=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  const old=p.status; p.status=val;
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{status:val});
  if(val==='done'&&old!=='done'){ closeModal('modal-detail'); fireConfetti(); }
};
window.updatePhaseNotes=async(fid,phase,val)=>{
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{[`phases.${phase}.notes`]:val});
};
window.updatePhaseField=async(fid,phase,field,val)=>{
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{[`phases.${phase}.${field}`]:val});
};
window.updatePhaseDate=async(fid,phase,val)=>{
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{[`phaseDates.${phase}`]:val});
};
window.addComment=async fid=>{
  const p=publications.find(x=>x.id===fid);
  const inp=document.getElementById('cmt-inp-'+fid);
  if(!p||!inp||!inp.value.trim()) return;
  const cm={author:currentUserData.name||currentUser.email,text:inp.value.trim(),date:todayStr(),isAdmin:isAdmin()};
  if(!p.phases) p.phases={}; if(!p.phases.editing) p.phases.editing={comments:[]};
  if(!p.phases.editing.comments) p.phases.editing.comments=[];
  p.phases.editing.comments.push(cm);
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{'phases.editing.comments':p.phases.editing.comments});
  const cont=document.getElementById('comments-'+fid);
  if(cont) cont.innerHTML+=`<div class="comment${cm.isAdmin?' comment-admin':''}"><div class="comment-meta">${cm.isAdmin?'👑 ':''}${esc(cm.author)} · ${cm.date}</div><div class="comment-text">${esc(cm.text)}</div></div>`;
  inp.value='';
};

function renderUnitsPage(c){
  const items=units.map((u,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span class="chip" style="${unitStyle(u)}">${esc(u)}</span><button class="btn btn-danger btn-sm" onclick="removeUnit(${i})">Eliminar</button></div>`).join('');
  c.innerHTML=adminBanner()+`<div class="card" style="max-width:520px"><div class="card-title">🗂 Unidades de contenido</div><p style="font-size:13px;color:var(--muted);margin-bottom:16px">Clasifica el contenido por categoría o departamento.</p><div>${items}</div><div style="display:flex;gap:8px;margin-top:16px"><input class="form-control" id="new-unit-page" placeholder="Nueva unidad..."/><button class="btn btn-primary" onclick="addUnitPage()">Agregar</button></div></div>`;
}
window.addUnitPage=async()=>{
  const v=document.getElementById('new-unit-page').value.trim(); if(!v) return;
  if(!units.includes(v)) units.push(v);
  document.getElementById('new-unit-page').value='';
  await saveUserData('units',units); renderView('units');
};
window.removeUnit=async i=>{ units.splice(i,1); await saveUserData('units',units); renderView('units'); };

// ====== AI ======
function renderAI(c){
  const msgs=aiContext.messages.map(m=>`<div class="chat-msg ${m.role}"><div class="chat-who">${m.role==='user'?'👤 Tú':'🤖 Asistente IA'}</div><div class="chat-bubble">${m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`).join('');
  const qBtns=[
    [`Dame 5 ideas de contenido para esta semana con mis unidades: ${units.join(', ')}`,'💡 5 ideas esta semana'],
    ['¿Qué tendencias de contenido aplican para mi negocio?','📈 Tendencias actuales'],
    ['Ayúdame a estructurar un calendario de contenido mensual','📅 Planificar calendario'],
    ['¿Qué tipo de contenido genera más engagement?','🔥 Tips de engagement']
  ].map(q=>`<button class="btn btn-outline btn-sm" style="text-align:left" onclick="quickPrompt('${q[0].replace(/'/g,"\\'")+''}')">${q[1]}</button>`).join('');

  c.innerHTML=adminBanner()+`<div style="display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:1100px">
    <div><div class="card"><div class="card-title">🤖 Asistente IA de Contenido</div>
    <div class="chat-area" id="chat-area">${msgs||'<div style="color:var(--muted);font-size:13px;text-align:center;padding-top:80px">Configura tu contexto y comienza →</div>'}</div>
    <div class="chat-input-row"><input class="chat-input" id="chat-inp" placeholder="Pide ideas, estrategias, análisis..." onkeydown="if(event.key==='Enter')sendAI()"/>
    <button class="btn btn-primary" onclick="sendAI()">Enviar</button></div></div></div>
    <div><div class="card"><div class="card-title">⚙️ Contexto del negocio</div>
    <div class="form-group"><label class="form-label">Descripción del negocio</label><textarea class="form-control" id="ai-biz" style="min-height:90px" placeholder="¿A qué se dedica?">${esc(aiContext.business)}</textarea></div>
    <div class="form-group"><label class="form-label">Mercado objetivo</label><textarea class="form-control" id="ai-mkt" style="min-height:75px" placeholder="Cliente ideal...">${esc(aiContext.market)}</textarea></div>
    <button class="btn btn-navy" style="width:100%" onclick="saveAIContext()">Guardar contexto</button></div>
    <div class="card"><div class="card-title">💡 Acciones rápidas</div><div style="display:flex;flex-direction:column;gap:8px">${qBtns}</div></div></div></div>`;
}
window.saveAIContext=async()=>{
  aiContext.business=document.getElementById('ai-biz').value;
  aiContext.market=document.getElementById('ai-mkt').value;
  await saveUserData('aiContext',aiContext); alert('✓ Contexto guardado');
};
window.quickPrompt=text=>{document.getElementById('chat-inp').value=text;sendAI();};
window.sendAI=async()=>{
  const inp=document.getElementById('chat-inp'); const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; aiContext.messages.push({role:'user',content:msg});
  const ca=document.getElementById('chat-area');
  ca.innerHTML+=`<div class="chat-msg user"><div class="chat-who">👤 Tú</div><div class="chat-bubble">${esc(msg)}</div></div>`;
  ca.innerHTML+=`<div class="chat-msg ai" id="ai-loading"><div class="chat-who">🤖 Asistente IA</div><div class="chat-bubble"><div class="loading"><div class="spinner"></div> Analizando...</div></div></div>`;
  ca.scrollTop=ca.scrollHeight;
  const sys=`Eres experto en marketing de contenidos.\n${aiContext.business?'Negocio: '+aiContext.business+'\n':''}${aiContext.market?'Mercado: '+aiContext.market+'\n':''}Unidades: ${units.join(', ')}. Responde en español, conciso y accionable.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:aiContext.messages.slice(-8)})});
    const data=await r.json();
    const text=(data.content?.[0]?.text)||'Error.';
    aiContext.messages.push({role:'assistant',content:text});
    saveUserData('aiContext',{...aiContext,messages:aiContext.messages.slice(-20)});
    document.getElementById('ai-loading')?.outerHTML && (document.getElementById('ai-loading').outerHTML=`<div class="chat-msg ai"><div class="chat-who">🤖 Asistente IA</div><div class="chat-bubble">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`);
  }catch(e){ if(document.getElementById('ai-loading')) document.getElementById('ai-loading').outerHTML=`<div class="chat-msg ai"><div class="chat-who">🤖 Asistente IA</div><div class="chat-bubble" style="color:#dc2626">Error de conexión.</div></div>`; }
  const ca2=document.getElementById('chat-area'); if(ca2) ca2.scrollTop=ca2.scrollHeight;
};

// ====== METRICS ======
function renderMetrics(c){
  const tv=publications.reduce((a,p)=>a+(parseInt(p.metrics?.views)||0),0);
  const tr=publications.reduce((a,p)=>a+(parseInt(p.metrics?.reach)||0),0);
  const ti=publications.reduce((a,p)=>a+(parseInt(p.metrics?.interactions)||0),0);
  const rows=publications.map(p=>{
    const m=p.metrics||{};
    const mi=f=>`<input class="metric-input" type="number" min="0" value="${m[f]||''}" placeholder="—" onchange="updateMetric('${p.id}','${f}',this.value)"/>`;
    return `<tr><td style="padding:10px 12px;font-size:13px;font-weight:600">${esc(p.pubId||p.id)}</td><td style="padding:10px 12px"><span class="chip" style="${unitStyle(p.unit)}">${esc(p.unit)}</span></td><td style="padding:10px 12px;font-size:13px">${p.phases?.publish?.publishDate||p.date||'—'}</td><td style="padding:10px 12px">${mi('views')}</td><td style="padding:10px 12px">${mi('reach')}</td><td style="padding:10px 12px">${mi('interactions')}</td><td style="padding:10px 12px">${mi('shares')}</td><td style="padding:10px 12px">${mi('saves')}</td><td style="padding:10px 12px"><button class="btn btn-navy btn-sm" onclick="analyzeMetrics('${p.id}')">🤖</button></td></tr>`;
  }).join('');
  c.innerHTML=adminBanner()+`<div class="stat-grid"><div class="stat-box"><div class="stat-num" id="sv">${tv.toLocaleString()}</div><div class="stat-lbl">Total vistas</div></div><div class="stat-box"><div class="stat-num" id="sr">${tr.toLocaleString()}</div><div class="stat-lbl">Alcance total</div></div><div class="stat-box"><div class="stat-num" id="si">${ti.toLocaleString()}</div><div class="stat-lbl">Interacciones</div></div></div>
  <div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="card-title" style="margin:0">📊 Métricas por publicación <span style="font-size:11px;color:var(--muted);font-weight:400">· a 7 días de publicado</span></div><button class="btn btn-primary btn-sm" onclick="analyzeAllMetrics()">🤖 Análisis global</button></div>
  <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--light)">${['ID','Unidad','Publicado','Vistas','Alcance','Interac.','Compartidos','Guardados','IA'].map(h=>`<th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div></div><div id="metrics-ai-result"></div>`;
}
window.updateMetric=async(fid,field,val)=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  if(!p.metrics) p.metrics={};
  p.metrics[field]=parseInt(val)||0;
  await updateDoc(doc(db,'users',activeClientId(),'publications',fid),{[`metrics.${field}`]:parseInt(val)||0});
  const tv=publications.reduce((a,p)=>a+(parseInt(p.metrics?.views)||0),0);
  const tr=publications.reduce((a,p)=>a+(parseInt(p.metrics?.reach)||0),0);
  const ti=publications.reduce((a,p)=>a+(parseInt(p.metrics?.interactions)||0),0);
  const sv=document.getElementById('sv');const sr=document.getElementById('sr');const si=document.getElementById('si');
  if(sv)sv.textContent=tv.toLocaleString();if(sr)sr.textContent=tr.toLocaleString();if(si)si.textContent=ti.toLocaleString();
};
async function callAI(prompt){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})});
  const data=await r.json(); return data.content?.[0]?.text||'Error.';
}
window.analyzeMetrics=async fid=>{
  const p=publications.find(x=>x.id===fid); if(!p) return;
  const rd=document.getElementById('metrics-ai-result');
  rd.innerHTML=`<div class="card" style="margin-top:16px"><div class="loading"><div class="spinner"></div> Analizando ${p.pubId||p.id}...</div></div>`;
  try{
    const text=await callAI(`Analiza métricas (7 días) y dame recomendaciones:\n- Pub: ${p.pubId||p.id} (${p.unit})\n- Guión: ${p.script}\n- Vistas:${p.metrics?.views}, Alcance:${p.metrics?.reach}, Inter:${p.metrics?.interactions}, Compartidos:${p.metrics?.shares}, Guardados:${p.metrics?.saves}\n${aiContext.business?'- Negocio: '+aiContext.business+'\n':''}Dame: 1) Evaluación, 2) Qué funcionó, 3) Mejoras, 4) Siguiente contenido. En español.`);
    rd.innerHTML=`<div class="card" style="margin-top:16px;border-left:3px solid var(--orange)"><div class="card-title">🤖 Análisis — ${esc(p.pubId||p.id)}</div><div style="font-size:13px;line-height:1.7">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`;
  }catch(e){rd.innerHTML=`<div class="card" style="margin-top:16px"><div style="color:#dc2626;font-size:13px">Error de conexión.</div></div>`;}
};
window.analyzeAllMetrics=async()=>{
  const rd=document.getElementById('metrics-ai-result');
  rd.innerHTML=`<div class="card" style="margin-top:16px"><div class="loading"><div class="spinner"></div> Análisis global...</div></div>`;
  const summary=publications.map(p=>`${p.pubId||p.id}(${p.unit}): vistas=${p.metrics?.views||0}, alcance=${p.metrics?.reach||0}, inter=${p.metrics?.interactions||0}`).join('\n');
  try{
    const text=await callAI(`Análisis global:\n${summary}\n${aiContext.business?'Negocio: '+aiContext.business+'\n':''}Unidades: ${units.join(', ')}\nDame: 1) Mejor unidad, 2) Patrones engagement, 3) Estrategia próximo mes, 4) Prioridades. En español.`);
    rd.innerHTML=`<div class="card" style="margin-top:16px;border-left:3px solid var(--navy)"><div class="card-title">🤖 Análisis global</div><div style="font-size:13px;line-height:1.7">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`;
  }catch(e){rd.innerHTML=`<div class="card" style="margin-top:16px"><div style="color:#dc2626;font-size:13px">Error de conexión.</div></div>`;}
};

// ====== ADMIN ======
function renderAdmin(c){
  if(!isAdmin()){c.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Acceso restringido</div>';return;}
  const cards=allClients.map(cl=>`<div class="client-card${viewingClientId===cl.id?' selected':''}" onclick="selectClient('${cl.id}')"><div style="font-weight:600;font-size:14px;margin-bottom:4px">${esc(cl.name)}</div><div style="font-size:12px;color:var(--muted)">${esc(cl.email)}</div><div style="font-size:11px;color:var(--orange);margin-top:8px;font-weight:500">Desde ${cl.createdAt}</div></div>`).join('');
  c.innerHTML=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div class="card-title" style="margin:0">👥 Clientes registrados</div><button class="btn btn-primary btn-sm" onclick="switchAuthTab('register');document.getElementById('auth-screen').style.display='flex'">+ Nuevo cliente</button></div>
  ${cards?`<div class="client-grid">${cards}</div>`:'<div style="padding:20px;text-align:center;color:var(--muted)">No hay clientes aún.</div>'}
  <div style="margin-top:12px;padding:12px;background:var(--light);border-radius:8px;font-size:12px;color:var(--muted)">💡 Haz clic en un cliente para ver y gestionar su parrilla.</div></div>`;
}
window.selectClient=async clientId=>{
  viewingClientId=clientId;
  const cl=allClients.find(c=>c.id===clientId);
  units=cl.units||['General']; aiContext=cl.aiContext||{business:'',market:'',messages:[]};
  subscribePublications(); navigate('calendar');
};

window.closeModal=id=>{ document.getElementById(id).style.display='none'; };
</script>
